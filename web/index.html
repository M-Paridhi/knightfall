<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knightfall Chess Engine</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sq: 70px;           /* one square size — change here to rescale board */
    --board: calc(var(--sq) * 8);
    --light: #f0d9b5;
    --dark:  #b58863;
    --bg:    #0d1117;
    --panel: #161b22;
    --border:#30363d;
    --text:  #e6edf3;
    --muted: #8b949e;
    --gold:  #f0c040;
    --blue:  #58a6ff;
    --green: #2ea043;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  header { text-align: center; margin-bottom: 20px; }
  header h1 { font-size: 2rem; letter-spacing: 3px; color: var(--gold); }
  header p  { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }

  .layout {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ── Board + eval bar ───────────────────── */
  .board-section {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  /* Eval bar */
  .eval-bar-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding-top: 2px;
  }
  .eval-label { font-size: 0.7rem; color: var(--muted); }
  .eval-bar {
    width: 24px;
    height: var(--board);
    background: #1a1a2e;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    border: 1px solid var(--border);
  }
  /* Black side fills from top */
  .eval-fill-black {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    background: #1c1c1c;
    transition: height 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  /* White side fills from bottom */
  .eval-fill-white {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    background: #f0f0f0;
    transition: height 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .eval-score {
    font-size: 0.75rem; color: var(--muted); font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  /* Board wrapper — fixed pixel size for consistent squares */
  .board-wrap {
    position: relative;
  }

  .coord-file {
    display: flex;
    width: var(--board);
    padding: 3px 0 0;
    font-size: 0.65rem;
    color: var(--muted);
  }
  .coord-file span { flex: 1; text-align: center; }

  #board {
    width: var(--board);
    height: var(--board);
    display: grid;
    grid-template-columns: repeat(8, var(--sq));
    grid-template-rows: repeat(8, var(--sq));
    border: 2px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    user-select: none;
    position: relative; /* for flying piece */
  }

  .sq {
    width: var(--sq);
    height: var(--sq);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
  }
  .sq.light { background: var(--light); }
  .sq.dark  { background: var(--dark);  }
  .sq.selected  { background: #cdd16f !important; }
  .sq.legal     { background: rgba(0,200,100,0.35) !important; }
  .sq.lastmove  { background: rgba(205,209,111,0.6) !important; }
  .sq:hover     { filter: brightness(1.08); }

  /* Legal move dot on empty squares */
  .sq.legal:not(.has-piece)::after {
    content: '';
    width: 30%;
    height: 30%;
    border-radius: 50%;
    background: rgba(0,160,80,0.55);
    pointer-events: none;
  }
  /* Legal capture ring on occupied squares */
  .sq.legal.has-piece::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 0;
    box-shadow: inset 0 0 0 5px rgba(0,160,80,0.6);
    pointer-events: none;
  }

  /* ── Piece glyphs ───────────────────────── */
  .piece {
    pointer-events: none;
    line-height: 1;
    font-size: calc(var(--sq) * 0.76);
    display: block;
    position: relative;
    z-index: 1;
  }
  /* White pieces: white fill, dark border for contrast */
  .piece.white {
    color: #ffffff;
    text-shadow:
      0 0 2px #1a1005,
      1px 1px 0 #5a3a00,
      -1px -1px 0 #5a3a00,
      1px -1px 0 #5a3a00,
      -1px 1px 0 #5a3a00,
      0 2px 4px rgba(0,0,0,0.6);
  }
  /* Black pieces: rich dark fill, light border for contrast */
  .piece.black {
    color: #1a1005;
    text-shadow:
      0 0 1px #d4a843,
      1px 1px 0 #8a6520,
      -1px -1px 0 #8a6520,
      1px -1px 0 #8a6520,
      -1px 1px 0 #8a6520,
      0 2px 4px rgba(0,0,0,0.5);
  }

  /* ── Flying piece animation ─────────────── */
  #flying-piece {
    position: fixed;    /* fixed so it isn't clipped by board overflow:hidden */
    pointer-events: none;
    z-index: 999;
    transition: left 0.18s cubic-bezier(0.4,0,0.2,1),
                top  0.18s cubic-bezier(0.4,0,0.2,1);
    font-size: calc(var(--sq) * 0.76);
    line-height: 1;
    will-change: left, top;
  }
  #flying-piece.white {
    color: #ffffff;
    text-shadow:
      0 0 2px #1a1005,
      1px 1px 0 #5a3a00, -1px -1px 0 #5a3a00,
      1px -1px 0 #5a3a00, -1px 1px 0 #5a3a00,
      0 2px 4px rgba(0,0,0,0.6);
  }
  #flying-piece.black {
    color: #1a1005;
    text-shadow:
      0 0 1px #d4a843,
      1px 1px 0 #8a6520, -1px -1px 0 #8a6520,
      1px -1px 0 #8a6520, -1px 1px 0 #8a6520,
      0 2px 4px rgba(0,0,0,0.5);
  }

  /* ── Right panel ────────────────────────── */
  .panel {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 300px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .card h3 {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  #status {
    font-size: 1rem; font-weight: 600; color: var(--gold); min-height: 24px;
  }

  /* Search grid */
  .info-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .info-item { display: flex; flex-direction: column; gap: 2px; }
  .info-label { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .info-value { font-size: 1.05rem; font-weight: 700; color: var(--blue); font-variant-numeric: tabular-nums; }

  #pv {
    font-size: 0.78rem; color: var(--muted); word-break: break-all;
    min-height: 18px; font-family: 'Consolas', monospace; line-height: 1.6;
  }
  #last-info {
    font-size: 0.65rem; color: #6e7681; font-family: 'Consolas', monospace;
    min-height: 14px; word-break: break-all; margin-top: 6px;
  }

  /* ── Move history (PGN two-column) ─────── */
  #history {
    font-size: 0.82rem;
    font-family: 'Consolas', monospace;
    color: var(--text);
    max-height: 180px;
    overflow-y: auto;
    line-height: 1;
  }
  #history::-webkit-scrollbar { width: 4px; }
  #history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .pgn-row {
    display: grid;
    grid-template-columns: 28px 1fr 1fr;
    gap: 2px;
    padding: 3px 0;
    border-bottom: 1px solid rgba(48,54,61,0.4);
  }
  .pgn-row:last-child { border-bottom: none; }
  .pgn-num  { color: var(--muted); font-size: 0.72rem; padding-top: 2px; text-align: right; padding-right: 6px; }
  .pgn-w    { color: #f0f0f0; padding: 2px 4px; border-radius: 3px; cursor: default; }
  .pgn-b    { color: #c0c0c0; padding: 2px 4px; border-radius: 3px; cursor: default; }
  .pgn-w.latest, .pgn-b.latest {
    background: rgba(240,192,64,0.15);
    color: var(--gold);
  }

  /* Controls */
  .controls { display: flex; flex-direction: column; gap: 8px; }

  .btn {
    padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 6px; background: #21262d; color: var(--text);
    font-size: 0.85rem; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    width: 100%; text-align: center;
  }
  .btn:hover { background: #30363d; border-color: var(--muted); }
  .btn.primary { background: #1a5c2a; border-color: var(--green); }
  .btn.primary:hover { background: var(--green); }
  .btn.danger  { background: #5a1a1a; border-color: #da3633; }
  .btn.danger:hover  { background: #8b2020; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  select, input[type=range] {
    background: #21262d; color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 6px 8px; font-size: 0.85rem; width: 100%;
  }

  .row { display: flex; gap: 8px; align-items: center; }
  .row label { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

  /* Connection dot */
  .conn-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #da3633; display: inline-block;
    margin-right: 6px; transition: background 0.3s;
  }
  .conn-dot.on { background: var(--green); }
  #conn-label { font-size: 0.75rem; color: var(--muted); }

  /* Thinking dot */
  .thinking-dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--gold);
    animation: pulse 0.8s infinite alternate;
    margin-left: 6px; vertical-align: middle;
  }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.2; } }

  /* Game over overlay */
  #gameover {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    align-items: center; justify-content: center; z-index: 100;
  }
  #gameover.show { display: flex; }
  .gameover-box {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 32px 48px; text-align: center;
  }
  .gameover-box h2 { font-size: 2rem; color: var(--gold); margin-bottom: 8px; }
  .gameover-box p  { color: var(--muted); margin-bottom: 24px; }

  /* Responsive cap */
  @media (max-width: 900px) {
    :root { --sq: 52px; }
    .panel { width: 260px; }
  }
  @media (max-width: 640px) {
    :root { --sq: 42px; }
    .panel { width: 100%; max-width: 340px; }
    .board-section { flex-direction: column; align-items: center; }
    .eval-bar { width: var(--board) !important; height: 20px !important; }
    .eval-fill-black { top:0; left:0; width:auto; height:100% !important; }
    .eval-fill-white { bottom:0; right:0; left:auto; width:auto; height:100% !important; }
  }
</style>
</head>
<body>

<header>
  <h1>♞ KNIGHTFALL</h1>
  <p>Chess Engine Visualization &mdash; Alpha-Beta &middot; Iterative Deepening &middot; Transposition Tables</p>
</header>

<!-- Flying piece — lives outside board to avoid clipping -->
<div id="flying-piece" style="display:none"></div>

<div class="layout">

  <!-- Board -->
  <div class="board-section">
    <div class="eval-bar-wrap">
      <span class="eval-label">+∞</span>
      <div class="eval-bar">
        <div class="eval-fill-black" id="eval-black" style="height:50%"></div>
        <div class="eval-fill-white" id="eval-white" style="height:50%"></div>
      </div>
      <span class="eval-label">−∞</span>
      <span class="eval-score" id="eval-score">+0.00</span>
    </div>
    <div class="board-wrap">
      <div id="board"></div>
      <div class="coord-file" id="coord-file"></div>
    </div>
  </div>

  <!-- Right panel -->
  <div class="panel">

    <!-- Status -->
    <div class="card">
      <h3>Status</h3>
      <div style="display:flex;align-items:center;margin-bottom:8px;">
        <span class="conn-dot" id="conn-dot"></span>
        <span id="conn-label">Connecting...</span>
      </div>
      <div id="status">Waiting for engine...</div>
      <div id="thinking-wrap" style="display:none">
        <span style="font-size:0.8rem;color:var(--gold)">Engine thinking</span>
        <span class="thinking-dot"></span>
      </div>
    </div>

    <!-- Search info -->
    <div class="card">
      <h3>Search</h3>
      <div class="info-grid">
        <div class="info-item">
          <span class="info-label">Depth</span>
          <span class="info-value" id="i-depth">—</span>
        </div>
        <div class="info-item">
          <span class="info-label">Score</span>
          <span class="info-value" id="i-score">—</span>
        </div>
        <div class="info-item">
          <span class="info-label">Nodes</span>
          <span class="info-value" id="i-nodes">—</span>
        </div>
        <div class="info-item">
          <span class="info-label">NPS</span>
          <span class="info-value" id="i-nps">—</span>
        </div>
      </div>
      <div style="margin-top:10px;">
        <div class="info-label" style="margin-bottom:4px;">Principal Variation</div>
        <div id="pv">—</div>
      </div>
      <div id="last-info"></div>
    </div>

    <!-- Move history -->
    <div class="card">
      <h3>Move History</h3>
      <div id="history"><span style="color:var(--muted);font-size:0.8rem">No moves yet</span></div>
    </div>

    <!-- Controls -->
    <div class="card">
      <h3>Controls</h3>
      <div class="controls">
        <div class="row">
          <label>Play as</label>
          <select id="side-select">
            <option value="white">White</option>
            <option value="black">Black</option>
          </select>
        </div>
        <div class="row">
          <label>Depth</label>
          <input type="range" id="depth-range" min="1" max="8" value="5">
          <span id="depth-label" style="font-size:0.85rem;min-width:20px;color:var(--gold);font-weight:700">5</span>
        </div>
        <button class="btn primary" id="btn-new">New Game</button>
        <button class="btn danger"  id="btn-undo">Undo Move</button>
      </div>
    </div>

  </div>
</div>

<!-- Game over overlay -->
<div id="gameover">
  <div class="gameover-box">
    <h2 id="go-title">Game Over</h2>
    <p id="go-subtitle">—</p>
    <button class="btn primary" onclick="newGame()">Play Again</button>
  </div>
</div>

<script>
// ════════════════════════════════════════
//  State
// ════════════════════════════════════════
let ws = null;
let board = [];          // 64 piece chars, '' = empty
let selected = -1;
let legalTargets = [];
let lastMove = [-1, -1];
let humanIsWhite = true;
let flipped = false;
let moveHistory = [];    // {white, black}[]
let depth = 5;
let thinking = false;
let gameOver = false;
let isHumanTurn_local = true;
let boardTurn = 'white';       // tracks whose turn it actually is (for history)
let animating = false;         // true while a slide animation is in flight
let searchGen = 0;             // incremented on undo/newgame; stale enginemove msgs are discarded

const PIECES = {
  'P':'♙','N':'♘','B':'♗','R':'♖','Q':'♕','K':'♔',
  'p':'♟','n':'♞','b':'♝','r':'♜','q':'♛','k':'♚'
};

// ════════════════════════════════════════
//  Smooth slide animation
// ════════════════════════════════════════
function getSquareRect(sq) {
  const el = document.querySelector(`[data-sq="${sq}"]`);
  if (!el) return null;
  return el.getBoundingClientRect();
}

function animateMove(fromSq, toSq, pieceChar, colorClass, callback) {
  const fromRect = getSquareRect(fromSq);
  const toRect   = getSquareRect(toSq);
  if (!fromRect || !toRect) { animating = false; callback(); return; }

  animating = true;
  const fp = document.getElementById('flying-piece');
  fp.textContent = PIECES[pieceChar] || pieceChar;
  fp.className = colorClass;
  fp.style.display = 'block';

  const sqSize = fromRect.width;
  const offsetX = (sqSize - sqSize * 0.76) / 2;
  const offsetY = offsetX;

  fp.style.transition = 'none';
  fp.style.left = (fromRect.left + offsetX) + 'px';
  fp.style.top  = (fromRect.top  + offsetY) + 'px';

  fp.getBoundingClientRect();
  fp.style.transition = 'left 0.18s cubic-bezier(0.4,0,0.2,1), top 0.18s cubic-bezier(0.4,0,0.2,1)';
  fp.style.left = (toRect.left + offsetX) + 'px';
  fp.style.top  = (toRect.top  + offsetY) + 'px';

  setTimeout(() => {
    fp.style.display = 'none';
    animating = false;
    callback();
  }, 190);
}

// ════════════════════════════════════════
//  Board rendering
// ════════════════════════════════════════
function sqToVisual(sq) {
  const rank = Math.floor(sq / 8);
  const file = sq % 8;
  if (flipped) return (7 - rank) * 8 + (7 - file);
  return (7 - rank) * 8 + file;
}

function visualToSq(visual) {
  const r = Math.floor(visual / 8);
  const f = visual % 8;
  if (flipped) return ((7 - r) * 8) + (7 - f);
  return ((7 - r) * 8) + f;
}

function isWhitePieceChar(c) { return c && c === c.toUpperCase(); }

function buildBoard(hideSq) {
  const el = document.getElementById('board');
  el.innerHTML = '';

  const cf = document.getElementById('coord-file');
  cf.innerHTML = '';
  const files = flipped ? 'hgfedcba' : 'abcdefgh';
  for (const f of files) {
    const s = document.createElement('span');
    s.textContent = f;
    cf.appendChild(s);
  }

  for (let visual = 0; visual < 64; visual++) {
    const sq = visualToSq(visual);
    const r  = Math.floor(visual / 8);
    const f  = visual % 8;

    const div = document.createElement('div');
    div.className = 'sq ' + (((r + f) % 2 === 0) ? 'light' : 'dark');
    div.dataset.sq = sq;

    // Rank label on leftmost file
    if (f === 0) {
      const lbl = document.createElement('span');
      lbl.style.cssText = 'position:absolute;left:3px;top:2px;font-size:0.6rem;color:rgba(0,0,0,0.4);pointer-events:none';
      lbl.textContent = flipped ? (r + 1) : (8 - r);
      div.appendChild(lbl);
    }

    // Piece — hide the source square during animation
    const pieceChar = board[sq];
    if (pieceChar && sq !== hideSq) {
      const p = document.createElement('span');
      p.className = 'piece ' + (isWhitePieceChar(pieceChar) ? 'white' : 'black');
      p.textContent = PIECES[pieceChar] || '';
      div.appendChild(p);
      div.classList.add('has-piece');
    }

    if (sq === selected)           div.classList.add('selected');
    if (legalTargets.includes(sq)) div.classList.add('legal');
    if (lastMove.includes(sq))     div.classList.add('lastmove');

    div.addEventListener('click', () => onSquareClick(sq));
    el.appendChild(div);
  }
}

function renderBoard(pieces, newLastMove) {
  board = new Array(64).fill('');
  for (const p of pieces) board[p.sq] = p.piece;
  if (newLastMove) lastMove = newLastMove;
  // Don't interrupt an in-flight animation — buildBoard will be called
  // by the animation callback once it finishes.
  if (!animating) buildBoard();
}

// ════════════════════════════════════════
//  Square click
// ════════════════════════════════════════
function onSquareClick(sq) {
  if (gameOver || thinking || !isHumanTurn_local) return;

  const piece = board[sq];

  if (selected === -1) {
    if (!piece) return;
    if (isWhitePieceChar(piece) !== humanIsWhite) return;
    selected = sq;
    legalTargets = [];
    ws.send(JSON.stringify({type:'getmoves', sq: String(sq)}));
    buildBoard();

  } else if (sq === selected) {
    selected = -1; legalTargets = []; buildBoard();

  } else if (legalTargets.includes(sq)) {
    const from = selected;
    const to   = sq;
    const movingPiece = board[from];
    // Derive color from the piece itself — 100% reliable regardless of message timing
    const movingIsWhite = isWhitePieceChar(movingPiece);
    selected = -1; legalTargets = [];

    let moveStr = sqToAlg(from) + sqToAlg(to);
    if ((movingPiece==='P' && Math.floor(to/8)===7) ||
        (movingPiece==='p' && Math.floor(to/8)===0)) {
      moveStr += 'q';
    }

    const colorClass = isWhitePieceChar(movingPiece) ? 'white' : 'black';

    // Optimistically update local board state
    board[to] = board[from];
    board[from] = '';

    // Show board with source hidden, then animate
    buildBoard(from);
    animateMove(from, to, movingPiece, colorClass, () => {
      // Animation done — server's position message may have already
      // updated board[], so just refresh with correct lastMove highlight
      lastMove = [from, to];
      buildBoard();
      addToHistory(moveStr, movingIsWhite);
    });

    thinking = true;
    const sentGen = searchGen;   // capture generation for this search
    setThinking(true);
    ws.send(JSON.stringify({type:'move', move:moveStr, depth}));
    // Store sentGen so enginemove handler can verify it
    window._pendingGen = sentGen;

  } else {
    if (piece && isWhitePieceChar(piece) === humanIsWhite) {
      selected = sq; legalTargets = [];
      ws.send(JSON.stringify({type:'getmoves', sq: String(sq)}));
    } else {
      selected = -1; legalTargets = [];
    }
    buildBoard();
  }
}

function sqToAlg(sq) {
  return String.fromCharCode('a'.charCodeAt(0) + (sq % 8)) + (Math.floor(sq / 8) + 1);
}

// ════════════════════════════════════════
//  Eval bar
// ════════════════════════════════════════
function updateEval(cp) {
  const clamped = Math.max(-1000, Math.min(1000, cp));
  // White% = 50 + cp/20 (capped at 5–95 so bar never goes 100%)
  const whitePct = Math.max(5, Math.min(95, 50 + clamped / 20));
  const blackPct = 100 - whitePct;

  document.getElementById('eval-white').style.height = whitePct + '%';
  document.getElementById('eval-black').style.height = blackPct + '%';

  const display = Math.abs(cp) > 9000
    ? (cp > 0 ? '+M' : '-M')
    : (cp >= 0 ? '+' : '') + (cp / 100).toFixed(2);
  document.getElementById('eval-score').textContent = display;
  document.getElementById('i-score').textContent = display;
}

// ════════════════════════════════════════
//  Info parsing
// ════════════════════════════════════════
function parseInfoLine(line) {
  const get = (key) => {
    const m = line.match(new RegExp(key + '\\s+(\\S+)'));
    return m ? m[1] : null;
  };
  const d = get('depth'), score = get('cp'), nodes = get('nodes'), nps = get('nps');
  const pv = line.match(/pv\s+(.+)$/);
  if (d)     document.getElementById('i-depth').textContent = d;
  if (score) updateEval(parseInt(score));
  if (nodes) document.getElementById('i-nodes').textContent = fmtNum(parseInt(nodes));
  if (nps)   document.getElementById('i-nps').textContent   = fmtNum(parseInt(nps));
  if (pv)    document.getElementById('pv').textContent = pv[1].trim();
  document.getElementById('last-info').textContent = line;
}

function fmtNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}

// ════════════════════════════════════════
//  Move history — PGN two-column
// ════════════════════════════════════════
function addToHistory(move, isWhite) {
  if (isWhite) {
    moveHistory.push({white: move, black: ''});
  } else {
    if (moveHistory.length > 0)
      moveHistory[moveHistory.length - 1].black = move;
    else
      moveHistory.push({white: '...', black: move});
  }
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('history');
  if (moveHistory.length === 0) {
    el.innerHTML = '<span style="color:var(--muted);font-size:0.8rem">No moves yet</span>';
    return;
  }
  // Determine which cell is the latest move
  const lastIdx = moveHistory.length - 1;
  const lastRow = moveHistory[lastIdx];
  const latestIsBlack = lastRow.black !== '';

  el.innerHTML = moveHistory.map((m, i) => {
    const isLast = (i === lastIdx);
    const wClass = (isLast && !latestIsBlack) ? 'pgn-w latest' : 'pgn-w';
    const bClass = (isLast && latestIsBlack)  ? 'pgn-b latest' : 'pgn-b';
    return `<div class="pgn-row">
      <span class="pgn-num">${i+1}.</span>
      <span class="${wClass}">${m.white || ''}</span>
      <span class="${bClass}">${m.black || ''}</span>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

// Pop the last N half-moves from history
function popHistory(halfmoves) {
  for (let i = 0; i < halfmoves; i++) {
    if (moveHistory.length === 0) break;
    const last = moveHistory[moveHistory.length - 1];
    if (last.black !== '') {
      last.black = '';
    } else {
      moveHistory.pop();
    }
  }
  renderHistory();
}

// ════════════════════════════════════════
//  WebSocket
// ════════════════════════════════════════
function connect() {
  const wsUrl = 'ws://127.0.0.1:' + (location.port || '8080');
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    document.getElementById('conn-dot').classList.add('on');
    document.getElementById('conn-label').textContent = 'Connected';
    ws.send(JSON.stringify({type:'init'}));
  };

  ws.onclose = () => {
    document.getElementById('conn-dot').classList.remove('on');
    document.getElementById('conn-label').textContent = 'Reconnecting...';
    setTimeout(connect, 1500);
  };

  ws.onerror = () => {
    document.getElementById('conn-label').textContent = 'Connection error';
  };

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);

    if (msg.type === 'position') {
      boardTurn = msg.turn;  // track actual turn for history
      const whiteTurn = msg.turn === 'white';
      isHumanTurn_local = (whiteTurn === humanIsWhite);
      // Update board data but don't override lastMove if animation running
      renderBoard(msg.pieces);
      document.getElementById('status').textContent =
        (whiteTurn ? '⬜ White' : '⬛ Black') + ' to move';

    } else if (msg.type === 'settings') {
      humanIsWhite = msg.humanIsWhite;
      isHumanTurn_local = humanIsWhite;
      document.getElementById('side-select').value = humanIsWhite ? 'white' : 'black';

    } else if (msg.type === 'info') {
      parseInfoLine(msg.line);

    } else if (msg.type === 'enginemove') {
      // Discard if this search was invalidated by an undo or new game
      if (window._pendingGen !== searchGen) return;

      thinking = false;
      setThinking(false);
      const mv = msg.move;
      const fIdx = mv.charCodeAt(0)-'a'.charCodeAt(0) + (mv.charCodeAt(1)-'1')*8;
      const tIdx = mv.charCodeAt(2)-'a'.charCodeAt(0) + (mv.charCodeAt(3)-'1')*8;

      // Derive engine color from the piece on the board (reliable, no timing issues)
      const enginePiece = board[fIdx];
      const engineIsWhite = enginePiece ? isWhitePieceChar(enginePiece) : !humanIsWhite;

      // Animate engine move
      if (enginePiece) {
        const colorClass = engineIsWhite ? 'white' : 'black';
        board[tIdx] = board[fIdx];
        board[fIdx] = '';
        buildBoard(fIdx);
        animateMove(fIdx, tIdx, enginePiece, colorClass, () => {
          lastMove = [fIdx, tIdx];
          buildBoard();
        });
      }

      addToHistory(mv, engineIsWhite);
      updateEval(msg.score);
      isHumanTurn_local = true;
      document.getElementById('status').textContent =
        (humanIsWhite ? '⬜ White' : '⬛ Black') + ' to move';

    } else if (msg.type === 'legalmoves') {
      legalTargets = msg.moves;
      buildBoard();

    } else if (msg.type === 'undo') {
      searchGen++;             // invalidate any in-flight engine response
      thinking = false;
      setThinking(false);
      gameOver = false;
      document.getElementById('gameover').classList.remove('show');
      popHistory(msg.halfmoves);
      selected = -1; legalTargets = [];
      document.getElementById('status').textContent = 'Move undone';

    } else if (msg.type === 'gameover') {
      gameOver = true;
      thinking = false;
      setThinking(false);
      const titles = {checkmate:'Checkmate!', stalemate:'Stalemate!'};
      const subs   = {white:'⬜ White wins!', black:'⬛ Black wins!', none:'Draw'};
      document.getElementById('go-title').textContent = titles[msg.reason] || 'Game Over';
      document.getElementById('go-subtitle').textContent = subs[msg.winner] || '';
      document.getElementById('gameover').classList.add('show');

    } else if (msg.type === 'error') {
      document.getElementById('status').textContent = '⚠ ' + msg.msg;
    }
  };
}

function setThinking(on) {
  document.getElementById('thinking-wrap').style.display = on ? 'block' : 'none';
  if (on) document.getElementById('status').textContent = '🔍 Engine thinking...';
}

// ════════════════════════════════════════
//  Controls
// ════════════════════════════════════════
function newGame() {
  searchGen++;               // invalidate any in-flight engine response
  gameOver = false;
  moveHistory = [];
  lastMove = [-1, -1];
  selected = -1; legalTargets = [];
  thinking = false; animating = false;
  boardTurn = 'white';
  window._pendingGen = searchGen;  // align so next engine response is accepted
  setThinking(false);
  document.getElementById('gameover').classList.remove('show');
  renderHistory();
  document.getElementById('pv').textContent = '—';
  document.getElementById('i-depth').textContent = '—';
  document.getElementById('i-score').textContent = '—';
  document.getElementById('i-nodes').textContent = '—';
  document.getElementById('i-nps').textContent = '—';
  document.getElementById('last-info').textContent = '';
  updateEval(0);

  const side = document.getElementById('side-select').value;
  humanIsWhite = (side === 'white');
  isHumanTurn_local = humanIsWhite;

  ws.send(JSON.stringify({type:'newgame', side, depth}));
}

document.getElementById('btn-new').onclick = newGame;

document.getElementById('btn-undo').onclick = () => {
  if (thinking) return; // don't undo while engine is thinking
  ws.send(JSON.stringify({type:'undo'}));
};

document.getElementById('depth-range').oninput = function() {
  depth = parseInt(this.value);
  document.getElementById('depth-label').textContent = depth;
};

// ════════════════════════════════════════
//  Init
// ════════════════════════════════════════
board = new Array(64).fill('');
buildBoard();
connect();
</script>
